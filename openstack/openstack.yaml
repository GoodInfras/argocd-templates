
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd
spec:
  generators:
    - list:
        elements:
          # Chaque élément représente une Application
          - app: mariadb
            condition: "if or (eq (int $.Values.mariadb.pod.replicas.server) 3) (eq (int $.Values.mariadb.pod.replicas.server) 1)"
          - app: memcached
            condition: "eq (int $.Values.memcached.pod.replicas.server) 1"
          - app: memcached-mcrouter
            condition: "eq (int $.Values.memcached.pod.replicas.server) 3"
          - app: rabbitmq
            condition: "if or (eq (int $.Values.rabbitmq.pod.replicas.server) 3) (eq (int $.Values.rabbitmq.pod.replicas.server) 1)"


  template:
    metadata:
      name: '{{app}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/openstack/openstack-helm.git
          targetRevision: '{{targetRevision | default "2025.2.0"}}'
          path: {{app}}
          helm:
            # Surcharge des valeurs Helm
            valuesFiles:
              - $templates/openstack/values/{{ app }}.yaml
              - $templates/values/default.yaml
            values:
              - test123: '{{ default "latest"}}'

        # Repo contenant les values.yaml
        - repoURL: https://github.com/GoodInfras/argocd-templates.git
          targetRevision: main
          ref: templates

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace | default openstack}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
