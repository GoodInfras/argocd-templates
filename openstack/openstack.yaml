apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd
spec:
  generators:
    - list:
        elements:
          # Chaque élément représente une Application
          - app: mariadb
          - app: memcached
          - app: rabbitmq

  template:
    metadata:
      name: '{{app}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/openstack/openstack-helm.git
          targetRevision: '{{targetRevision | default "2025.2.0"}}'
          path: {{app}}
          helm:
            # Surcharge des valeurs Helm
            valuesFiles:
              - openstack/values/{{ app }}.yaml
              - openstack/values/default.yaml
            values:
              - test123: '{{ default "latest"}}'

        # Repo contenant les values.yaml
        - repoURL: https://github.com/GoodInfras/argocd-templates.git
          targetRevision: main
          ref: valuesRepo

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace | default openstack}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
