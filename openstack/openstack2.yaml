apps_values:
  openstack-helm:
    repoURL: "https://github.com/openstack/openstack-helm.git"
    targetRevision: "2025.2.0"
    domain:
    path: ./

apps_dict_tpl:
  argocd-apps:
    memcached:
      metadata:
        namespace: argocd        
      spec:
        destination: 
          namespace: openstack            
        sources:
          repoURL: '{{  index .Values.apps_values "argocd-apps" "repoURL" }}'
          targetRevision: HEAD
          path: '{{  index .Values.apps_values "argocd-apps" "path" }}'







#syncPolicy:
#  automated:
#    prune: true
#    selfHeal: true
#  syncOptions:
#    - CreateNamespace=true

apps:           
  ingress:
    metadata:
      name: ingress
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      sources:
        - path: charts/infra/ingress 
          helm:
            values: |
              ingressDnsName: {{ .Values.ingressDnsName }}
              {{ if .Values.ingress }}
              {{ .Values.ingress | toYaml  }} 
              {{ end }}
 
  mariadb-cluster:
    condition: "gt (int $.Values.mariadb.pod.replicas.server) 1"       
    metadata:
      name: mariadb
    spec:
      sources:
        - path: charts/openstack-helm-infra/mariadb 
          helm:
            valueFiles:
              - values.yaml  
              #- values_overrides/tls.yaml
              - /values/openstack/mariadb.yaml                            
            values: |
              {{- $tpl := ( tpl (.Values.mariadb_tpl | toYaml) .) | default (dict) -}}
              {{- $tpl_string := ( tpl (.Values.mariadb_tpl_string | default (dict | toYaml)  ) .) | default (dict) -}}
              {{- $merged := merge (.Values.mariadb | default (dict) ) (fromYaml $tpl ) (fromYaml $tpl_string) -}}
              {{ $merged | toYaml  }}            

  mariadb:
    condition: "eq (int $.Values.mariadb.pod.replicas.server) 1"       
    metadata:
      name: mariadb
    spec:
      sources:
        - path: charts/openstack-helm-infra/mariadb 
          helm:
            valueFiles:
              - values.yaml
              #- values_overrides/tls.yaml   
              - /values/openstack/mariadb.yaml 
              #- /values/openstack/mariadb_disable_ingress.yaml 
                                        
            values: |
